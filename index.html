<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Data KPM PKH</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #2980b9; padding-bottom: 15px; }
        .drop-zone { border: 3px dashed #2980b9; padding: 40px; text-align: center; border-radius: 10px; color: #2980b9; cursor: pointer; background: #f9fbfd; margin-bottom: 25px; font-weight: bold; }
        .drop-zone:hover { background: #ebf2f9; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 15px; border-radius: 8px; text-align: center; color: white; }
        .bg-p { background: #2980b9; } .bg-a { background: #8e44ad; } .bg-aud { background: #27ae60; } 
        .bg-s { background: #d35400; } .bg-lan { background: #c0392b; } .bg-dis { background: #2c3e50; }
        .stat-val { display: block; font-size: 28px; font-weight: bold; }
        .stat-lbl { font-size: 11px; text-transform: uppercase; font-weight: bold; }

        .table-wrapper { overflow-x: auto; max-height: 600px; border: 1px solid #ddd; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; text-transform: uppercase; white-space: nowrap; }
        th { background: #2980b9; color: white; position: sticky; top: 0; z-index: 10; }
        
        .btn-dl { display: none; width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-dl:hover { background: #219150; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 Aplikasi Data KPM PKH</h2>
        <p>Dashboard Pengurus dan Komponen KPM PKH</p>
    </div>

    <div id="drop-zone" class="drop-zone">Tarik Semua File JSON Kolektor ke Sini</div>

    <div class="stats-grid" id="stats-area" style="display:none;">
        <div class="stat-card bg-p"><span class="stat-lbl">Total KPM</span><span class="stat-val" id="v-p">0</span></div>
        <div class="stat-card bg-a"><span class="stat-lbl">Total ART</span><span class="stat-val" id="v-a">0</span></div>
        <div class="stat-card bg-aud"><span class="stat-lbl">Komp. AUD</span><span class="stat-val" id="v-aud">0</span></div>
        <div class="stat-card bg-s"><span class="stat-lbl">Komp. Sekolah</span><span class="stat-val" id="v-s">0</span></div>
        <div class="stat-card bg-lan"><span class="stat-lbl">Komp. Lansia</span><span class="stat-val" id="v-lan">0</span></div>
        <div class="stat-card bg-dis"><span class="stat-lbl">Komp. Disabilitas</span><span class="stat-val" id="v-dis">0</span></div>
    </div>

    <button id="btn-download" class="btn-dl">📥 DOWNLOAD EXCEL REKAP TERPADU</button>

    <div class="table-wrapper" id="preview-area" style="display:none;">
        <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    let mP = {}, mA = {}, mS = {};
    window.uploadedFileName = ""; 

    const cols = ["NO", "NO KK", "NIK", "NAMA", "KOMPONEN", "DTSEN JENJANG", "DTSEN SEKOLAH", "DTSEN KIP", "DTSEN MSG", "DAPODIK JENJANG", "DAPODIK SEKOLAH", "DAPODIK KIP", "DAPODIK MSG", "ALAMAT", "RT", "RW", "DESA/KEL", "KECAMATAN", "STATUS", "PERIODE"];
    
    const toU = (v) => (v && v !== "-" && v !== "null" && v !== undefined) ? v.toString().toUpperCase() : "-";
    const padZero = (v) => {
        if (!v || v === "-" || v === "null") return "-";
        let s = v.toString().trim();
        if (s.length === 1) return "00" + s;
        if (s.length === 2) return "0" + s;
        return s;
    };

    document.getElementById('drop-zone').ondragover = (e) => e.preventDefault();
    document.getElementById('drop-zone').ondrop = async (e) => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files);
        for (const f of files) {
            if (f.name.toUpperCase().includes("PENGURUS")) {
                window.uploadedFileName = f.name;
            }

            const t = await f.text();
            try {
                const j = JSON.parse(t);
                const d = j.data || (Array.isArray(j) ? j : []);
                
                d.forEach(i => {
                    // 1. IDENTIFIKASI FILE DETAIL SEKOLAH
                    if (i.nik_art_sekolah || (i.data && (i.data.dtsenNamaSekolah || i.data.dapodikNamaSekolah))) {
                        const nikKey = i.nik_art_sekolah || i.nik_anggota_keluarga || i.nik_art;
                        if (nikKey) {
                            // AMBIL OBJEK 'data' DI DALAMNYA JIKA ADA NESTED OBJECT
                            mS[nikKey] = i.data ? i.data : i;
                        }
                    } 
                    // 2. IDENTIFIKASI FILE DATA PENGURUS
                    else if (i.nik_pengurus) {
                        const id = i.idpeserta_pkh || i.id_komitmen_kpm_pkh;
                        if (id) mP[id] = i;
                    } 
                    // 3. IDENTIFIKASI FILE DETAIL ART
                    else if (i.nik_anggota_keluarga) {
                        const id = i.idpeserta_pkh || i.id_komitmen_kpm_pkh;
                        if (id) {
                            if (!mA[id]) mA[id] = [];
                            mA[id].push(i);
                        }
                    }
                });
            } catch (err) {
                console.error("Gagal membaca file JSON:", err);
            }
        }
        render();
    };

    function render() {
        const tb = document.getElementById('tbody');
        const th = document.getElementById('thead');
        
        if (!th || !tb) return;
        
        th.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
        tb.innerHTML = "";
        
        let cP = Object.keys(mP).length, cA = 0, cAud = 0, cSek = 0, cLan = 0, cDis = 0, noKeluarga = 1;

        Object.keys(mP).forEach(id => {
            const p = mP[id], arts = mA[id] || [];
            
            const processItem = (item, type) => {
                const nik = type === 'P' ? item.nik_pengurus : item.nik_anggota_keluarga;
                
                // Mengambil referensi data sekolah berdasarkan NIK individu (ART / Pengurus)
                const s = mS[nik] || {}; 
                
                const rawComp = (item.komponen_bantuan || "").toUpperCase().replace(/_/g, " ").replace(/\s+/g, " ");
                const kDisplay = type === 'P' ? 'PENGURUS' : toU(rawComp);
                
                if(type === 'A') {
                    cA++;
                    if(rawComp.includes("USIA DINI") || rawComp.includes("AUD")) cAud++;
                    if(rawComp.includes("SEKOLAH") || rawComp.includes("SD") || rawComp.includes("SMP") || rawComp.includes("SMA")) cSek++;
                    if(rawComp.includes("LANSIA")) cLan++;
                    if(rawComp.includes("DISABILITAS")) cDis++;
                }

                const tr = document.createElement('tr');
                tr.style.backgroundColor = (noKeluarga % 2 === 0) ? "#f2f7fb" : "#ffffff";
                tr.innerHTML = `
                    <td>${noKeluarga}</td>
                    <td>${p.nokk || "-"}</td>
                    <td>${nik || "-"}</td>
                    <td>${toU(item.nama_pengurus || item.nama_anggota_keluarga)}</td>
                    <td>${kDisplay}</td>
                    <td>${toU(s.dtsenJenjangPendidikan)}</td>
                    <td>${toU(s.dtsenNamaSekolah)}</td>
                    <td>${toU(s.dtsenPenerimaKip)}</td>
                    <td>${toU(s.dtsenMessage)}</td>
                    <td>${toU(s.dapodikJenjangPendidikan)}</td>
                    <td>${toU(s.dapodikNamaSekolah)}</td>
                    <td>${toU(s.dapodikPenerimaKip)}</td>
                    <td>${toU(s.dapodikMessage)}</td>
                    <td>${toU(p.alamat)}</td>
                    <td>${padZero(p.rt)}</td>
                    <td>${padZero(p.rw)}</td>
                    <td>${toU(p.kelurahan)}</td>
                    <td>${toU(p.kecamatan)}</td>
                    <td>${toU(p.nama_periode)}</td>
                    <td>${toU(p.periode_bansos)}</td>
                `;
                tb.appendChild(tr);
            };
            
            processItem(p, 'P');
            arts.forEach(a => processItem(a, 'A'));
            noKeluarga++; 
        });

        document.getElementById('v-p').innerText = cP;
        document.getElementById('v-a').innerText = cA;
        document.getElementById('v-aud').innerText = cAud;
        document.getElementById('v-s').innerText = cSek;
        document.getElementById('v-lan').innerText = cLan;
        document.getElementById('v-dis').innerText = cDis;
        
        document.getElementById('stats-area').style.display = 'grid';
        document.getElementById('preview-area').style.display = 'block';
        if(cP > 0) document.getElementById('btn-download').style.display = 'block';
    }

    document.getElementById('btn-download').onclick = () => {
        const keysmP = Object.keys(mP);
        if (keysmP.length === 0) return;

        let namaAkun = "DANI MUSTAQIM"; 

        if (window.uploadedFileName) {
            const namaClean = window.uploadedFileName.split('_')[0];
            if (namaClean) {
                namaAkun = namaClean.trim().toUpperCase();
            }
        }
        
        const firstKey = keysmP[0];
        let periodeBansos = mP[firstKey].periode_bansos || "DATA PKH";
        periodeBansos = periodeBansos.toString().trim().toUpperCase();

        const namaFileExcel = `${namaAkun}_DATA ${periodeBansos}.xlsx`;

        const headerStyle = { 
            font: { bold: true, color: { rgb: "FFFFFF" } }, 
            fill: { fgColor: { rgb: "2980B9" } }, 
            alignment: { vertical: "center", horizontal: "center" }, 
            border: { top: {style:"thin"}, bottom: {style:"thin"}, left: {style:"thin"}, right: {style:"thin"} } 
        };
        
        const rows = [cols.map(c => ({ v: c, s: headerStyle }))];
        let noX = 1;

        keysmP.forEach(id => {
            const p = mP[id], arts = mA[id] || [];
            
            const bgColor = (noX % 2 === 0) ? "F2F7FB" : "FFFFFF";
            const rowStyle = { 
                fill: { fgColor: { rgb: bgColor } },
                border: { top: {style:"thin"}, bottom: {style:"thin"}, left: {style:"thin"}, right: {style:"thin"} } 
            };
            
            const pushXls = (item, type) => {
                const nik = type === 'P' ? item.nik_pengurus : item.nik_anggota_keluarga;
                const s = mS[nik] || {};
                const r = [
                    noX, p.nokk, nik, (item.nama_pengurus || item.nama_anggota_keluarga), 
                    type === 'P' ? 'PENGURUS' : item.komponen_bantuan?.replace(/_/g,' '), 
                    s.dtsenJenjangPendidikan, s.dtsenNamaSekolah, s.dtsenPenerimaKip, s.dtsenMessage, 
                    s.dapodikJenjangPendidikan, s.dapodikNamaSekolah, s.dapodikPenerimaKip, s.dapodikMessage, 
                    p.alamat, padZero(p.rt), padZero(p.rw), p.kelurahan, p.kecamatan, p.nama_periode, p.periode_bansos
                ];
                rows.push(r.map((v, i) => ({ v: toU(v), t: (i===1 || i===2 || i===14 || i===15) ? 's' : 'v', s: rowStyle })));
            };
            pushXls(p, 'P');
            arts.forEach(a => pushXls(a, 'A'));
            noX++; 
        });

        const ws = XLSX.utils.aoa_to_sheet([]);
        XLSX.utils.sheet_add_aoa(ws, rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DATA_PKH");
        
        XLSX.writeFile(wb, namaFileExcel);
    };
</script>
</body>
</html>
